<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시험 답안 채점기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      text-align: center;
    }

    .description {
      text-align: center;
      color: #666;
      margin-bottom: 28px;
    }

    .exam-info {
      padding: 16px;
      background: #f0f3ff;
      border-radius: 12px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
    }

    th, td {
      border-bottom: 1px solid #ddd;
      padding: 12px;
      text-align: center;
    }

    th {
      background: #f8f8f8;
    }

    input[type="text"] {
      width: 90px;
      padding: 8px;
      border: 1px solid #bbb;
      border-radius: 8px;
      text-align: center;
      font-size: 15px;
    }

    button {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #3457ff;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #243ed8;
    }

    .result {
      margin-top: 28px;
      padding: 20px;
      border-radius: 12px;
      background: #f8f9fb;
      display: none;
    }

    .score {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .correct {
      color: #0a8f3c;
      font-weight: bold;
    }

    .wrong {
      color: #d92d20;
      font-weight: bold;
    }

    .wrong-list {
      margin-top: 12px;
      line-height: 1.8;
    }

    .small-text {
      font-size: 14px;
      color: #777;
      margin-top: 12px;
    }

    @media (max-width: 600px) {
      .container {
        margin: 16px;
        padding: 16px;
      }

      input[type="text"] {
        width: 70px;
      }

      th, td {
        padding: 8px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>시험 답안 채점기</h1>
    <p class="description">내 답안을 입력하면 정답과 비교해서 점수와 틀린 문항을 알려줍니다.</p>

    <section class="exam-info">
      <strong>시험명:</strong> 예시 시험지<br />
      <strong>문항 수:</strong> 10문항<br />
      <strong>만점:</strong> 100점
    </section>

    <table>
      <thead>
        <tr>
          <th>문항</th>
          <th>배점</th>
          <th>내 답</th>
        </tr>
      </thead>
      <tbody id="answerTable"></tbody>
    </table>

    <button onclick="gradeExam()">채점하기</button>

    <section id="result" class="result"></section>
  </main>

  <script>
    const exam = {
      title: "예시 시험지",
      questions: [
        { number: 1, answer: "3", score: 10 },
        { number: 2, answer: "1", score: 10 },
        { number: 3, answer: "4", score: 10 },
        { number: 4, answer: "2", score: 10 },
        { number: 5, answer: "5", score: 10 },
        { number: 6, answer: "2", score: 10 },
        { number: 7, answer: "1", score: 10 },
        { number: 8, answer: "4", score: 10 },
        { number: 9, answer: "3", score: 10 },
        { number: 10, answer: "5", score: 10 }
      ]
    };

    const answerTable = document.getElementById("answerTable");

    function renderTable() {
      answerTable.innerHTML = "";

      exam.questions.forEach((question) => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${question.number}번</td>
          <td>${question.score}점</td>
          <td>
            <input
              type="text"
              id="answer-${question.number}"
              placeholder="답 입력"
              autocomplete="off"
            />
          </td>
        `;

        answerTable.appendChild(row);
      });
    }

    function normalizeAnswer(answer) {
      return String(answer).trim().replace(/\s+/g, "").toLowerCase();
    }

    function gradeExam() {
      let totalScore = 0;
      let earnedScore = 0;
      const wrongAnswers = [];
      const emptyAnswers = [];

      exam.questions.forEach((question) => {
        totalScore += question.score;

        const input = document.getElementById(`answer-${question.number}`);
        const userAnswer = normalizeAnswer(input.value);
        const correctAnswer = normalizeAnswer(question.answer);

        if (userAnswer === "") {
          emptyAnswers.push(question.number);
          wrongAnswers.push({
            number: question.number,
            userAnswer: "미입력",
            correctAnswer: question.answer,
            score: question.score
          });
        } else if (userAnswer === correctAnswer) {
          earnedScore += question.score;
        } else {
          wrongAnswers.push({
            number: question.number,
            userAnswer: input.value.trim(),
            correctAnswer: question.answer,
            score: question.score
          });
        }
      });

      showResult(earnedScore, totalScore, wrongAnswers, emptyAnswers);
    }

    function showResult(earnedScore, totalScore, wrongAnswers, emptyAnswers) {
      const result = document.getElementById("result");
      const correctCount = exam.questions.length - wrongAnswers.length;
      const percentage = Math.round((earnedScore / totalScore) * 100);

      let html = `
        <div class="score">점수: ${earnedScore}점 / ${totalScore}점 (${percentage}%)</div>
        <p><span class="correct">맞힌 문항:</span> ${correctCount}개</p>
        <p><span class="wrong">틀린 문항:</span> ${wrongAnswers.length}개</p>
      `;

      if (wrongAnswers.length === 0) {
        html += `<p class="correct">전부 맞았습니다!</p>`;
      } else {
        html += `<div class="wrong-list"><strong>오답 목록</strong><br />`;

        wrongAnswers.forEach((item) => {
          html += `
            ${item.number}번 - 내 답: ${item.userAnswer}, 정답: ${item.correctAnswer}, 배점: ${item.score}점<br />
          `;
        });

        html += `</div>`;
      }

      if (emptyAnswers.length > 0) {
        html += `<p class="small-text">미입력 문항: ${emptyAnswers.join(", ")}번</p>`;
      }

      result.innerHTML = html;
      result.style.display = "block";
      result.scrollIntoView({ behavior: "smooth" });
    }

    renderTable();
  </script>
</body>
</html>
