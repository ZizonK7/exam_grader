<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시험 답안 채점기</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      max-width: 980px;
      margin: 40px auto;
      padding: 24px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 { margin-top: 0; font-size: 28px; text-align: center; }
    h2 { margin-top: 32px; font-size: 22px; }
    h3 { margin: 0 0 10px; }

    .description { text-align: center; color: #666; margin-bottom: 28px; }

    .exam-info, .admin-box, .result, .history, .notice {
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .exam-info { background: #f0f3ff; line-height: 1.6; }
    .admin-box { background: #eefaf1; }
    .result { margin-top: 28px; background: #f8f9fb; display: none; }
    .history { margin-top: 28px; background: #fff8e8; }
    .notice { background: #fff2f2; color: #8a1f11; line-height: 1.6; }

    table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: center; }
    th { background: #f8f8f8; }

    input[type="text"], input[type="email"], input[type="password"], input[type="number"] {
      padding: 9px;
      border: 1px solid #bbb;
      border-radius: 8px;
      font-size: 15px;
    }

    input.answer-input { width: 90px; text-align: center; }
    .admin-input { width: 100%; margin-bottom: 10px; }

    button {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #3457ff;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover { background: #243ed8; }
    .secondary-button { margin-top: 12px; background: #555; }
    .secondary-button:hover { background: #333; }
    .danger-button { margin-top: 8px; background: #d92d20; }
    .danger-button:hover { background: #a81712; }
    .small-button { padding: 8px; font-size: 14px; margin-top: 6px; }

    .score { font-size: 24px; font-weight: bold; margin-bottom: 16px; }
    .correct { color: #0a8f3c; font-weight: bold; }
    .wrong { color: #d92d20; font-weight: bold; }
    .wrong-list { margin-top: 12px; line-height: 1.8; }
    .small-text { font-size: 14px; color: #777; margin-top: 12px; }

    .history-item {
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      background: white;
      border: 1px solid #eee;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .hidden { display: none; }

    @media (max-width: 700px) {
      .container { margin: 16px; padding: 16px; }
      input.answer-input { width: 70px; }
      th, td { padding: 8px; font-size: 14px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>시험 답안 채점기</h1>
    <p class="description">내 답안을 입력하면 정답과 비교해서 점수와 틀린 문항을 알려줍니다.</p>

    <section id="firebaseNotice" class="notice">
      Firebase 설정값을 아직 넣지 않았습니다. 코드의 firebaseConfig 부분을 본인 프로젝트 값으로 바꿔야 온라인 저장 기능이 작동합니다.
    </section>

    <section class="exam-info">
      <strong>시험명:</strong> 예시 시험지<br />
      <strong>문항 수:</strong> 10문항<br />
      <strong>만점:</strong> 100점
    </section>

    <table>
      <thead>
        <tr>
          <th>문항</th>
          <th>배점</th>
          <th>내 답</th>
        </tr>
      </thead>
      <tbody id="answerTable"></tbody>
    </table>

    <button id="gradeButton">채점하고 온라인 저장하기</button>
    <section id="result" class="result"></section>

    <section class="admin-box">
      <h2>관리자 로그인</h2>
      <p class="small-text">관리자만 전체 채점 기록을 보고, 점수를 수정하거나 기록을 삭제할 수 있습니다.</p>

      <div id="loginArea">
        <input id="adminEmail" class="admin-input" type="email" placeholder="관리자 이메일" />
        <input id="adminPassword" class="admin-input" type="password" placeholder="비밀번호" />
        <button id="loginButton">관리자 로그인</button>
      </div>

      <div id="adminArea" class="hidden">
        <p><strong id="adminStatus"></strong></p>
        <button id="loadRecordsButton">전체 기록 불러오기</button>
        <button id="logoutButton" class="secondary-button">로그아웃</button>
        <div id="adminRecords" class="history"></div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      doc,
      updateDoc,
      deleteDoc,
      serverTimestamp,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "여기에_API_KEY",
      authDomain: "여기에_PROJECT_ID.firebaseapp.com",
      projectId: "여기에_PROJECT_ID",
      storageBucket: "여기에_PROJECT_ID.appspot.com",
      messagingSenderId: "여기에_MESSAGING_SENDER_ID",
      appId: "여기에_APP_ID"
    };

    const ADMIN_UID = "여기에_관리자_UID";

    const exam = {
      title: "예시 시험지",
      questions: [
        { number: 1, answer: "3", score: 10 },
        { number: 2, answer: "1", score: 10 },
        { number: 3, answer: "4", score: 10 },
        { number: 4, answer: "2", score: 10 },
        { number: 5, answer: "5", score: 10 },
        { number: 6, answer: "2", score: 10 },
        { number: 7, answer: "1", score: 10 },
        { number: 8, answer: "4", score: 10 },
        { number: 9, answer: "3", score: 10 },
        { number: 10, answer: "5", score: 10 }
      ]
    };

    let app = null;
    let auth = null;
    let db = null;
    let firebaseReady = false;

    const answerTable = document.getElementById("answerTable");
    const result = document.getElementById("result");
    const firebaseNotice = document.getElementById("firebaseNotice");
    const loginArea = document.getElementById("loginArea");
    const adminArea = document.getElementById("adminArea");
    const adminStatus = document.getElementById("adminStatus");
    const adminRecords = document.getElementById("adminRecords");

    function initializeFirebaseIfConfigured() {
      const hasConfig = !firebaseConfig.apiKey.includes("여기에") && !ADMIN_UID.includes("여기에");

      if (!hasConfig) {
        return;
      }

      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      firebaseReady = true;
      firebaseNotice.classList.add("hidden");

      onAuthStateChanged(auth, (user) => {
        if (user && user.uid === ADMIN_UID) {
          loginArea.classList.add("hidden");
          adminArea.classList.remove("hidden");
          adminStatus.textContent = `${user.email} 계정으로 로그인 중`;
        } else {
          loginArea.classList.remove("hidden");
          adminArea.classList.add("hidden");
          adminRecords.innerHTML = "";
        }
      });
    }

    function renderTable() {
      answerTable.innerHTML = "";

      exam.questions.forEach((question) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${question.number}번</td>
          <td>${question.score}점</td>
          <td><input class="answer-input" type="text" id="answer-${question.number}" placeholder="답 입력" autocomplete="off" /></td>
        `;
        answerTable.appendChild(row);
      });
    }

    function normalizeAnswer(answer) {
      return String(answer).trim().replace(/\s+/g, "").toLowerCase();
    }

    async function gradeExam() {
      let totalScore = 0;
      let earnedScore = 0;
      const wrongAnswers = [];
      const emptyAnswers = [];
      const submittedAnswers = {};

      exam.questions.forEach((question) => {
        totalScore += question.score;
        const input = document.getElementById(`answer-${question.number}`);
        const userAnswer = normalizeAnswer(input.value);
        const correctAnswer = normalizeAnswer(question.answer);
        submittedAnswers[question.number] = input.value.trim();

        if (userAnswer === "") {
          emptyAnswers.push(question.number);
          wrongAnswers.push({ number: question.number, userAnswer: "미입력", correctAnswer: question.answer, score: question.score });
        } else if (userAnswer === correctAnswer) {
          earnedScore += question.score;
        } else {
          wrongAnswers.push({ number: question.number, userAnswer: input.value.trim(), correctAnswer: question.answer, score: question.score });
        }
      });

      const resultData = {
        examTitle: exam.title,
        earnedScore,
        totalScore,
        percentage: Math.round((earnedScore / totalScore) * 100),
        correctCount: exam.questions.length - wrongAnswers.length,
        wrongCount: wrongAnswers.length,
        wrongAnswers,
        emptyAnswers,
        submittedAnswers,
        createdAtText: new Date().toLocaleString("ko-KR")
      };

      showResult(resultData);

      if (!firebaseReady) {
        alert("Firebase 설정이 없어 온라인 저장은 되지 않았습니다. 현재 화면의 채점 결과만 확인할 수 있습니다.");
        return;
      }

      try {
        await addDoc(collection(db, "examRecords"), {
          ...resultData,
          createdAt: serverTimestamp()
        });
        alert("채점 결과가 온라인에 저장되었습니다.");
      } catch (error) {
        console.error(error);
        alert("온라인 저장에 실패했습니다. Firebase 설정과 보안 규칙을 확인하세요.");
      }
    }

    function showResult(resultData) {
      let html = `
        <div class="score">점수: ${resultData.earnedScore}점 / ${resultData.totalScore}점 (${resultData.percentage}%)</div>
        <p><span class="correct">맞힌 문항:</span> ${resultData.correctCount}개</p>
        <p><span class="wrong">틀린 문항:</span> ${resultData.wrongCount}개</p>
      `;

      if (resultData.wrongAnswers.length === 0) {
        html += `<p class="correct">전부 맞았습니다!</p>`;
      } else {
        html += `<div class="wrong-list"><strong>오답 목록</strong><br />`;
        resultData.wrongAnswers.forEach((item) => {
          html += `${item.number}번 - 내 답: ${item.userAnswer}, 정답: ${item.correctAnswer}, 배점: ${item.score}점<br />`;
        });
        html += `</div>`;
      }

      if (resultData.emptyAnswers.length > 0) {
        html += `<p class="small-text">미입력 문항: ${resultData.emptyAnswers.join(", ")}번</p>`;
      }

      result.innerHTML = html;
      result.style.display = "block";
      result.scrollIntoView({ behavior: "smooth" });
    }

    async function loginAdmin() {
      if (!firebaseReady) {
        alert("먼저 Firebase 설정값과 관리자 UID를 코드에 넣어야 합니다.");
        return;
      }

      const email = document.getElementById("adminEmail").value.trim();
      const password = document.getElementById("adminPassword").value;

      try {
        const credential = await signInWithEmailAndPassword(auth, email, password);

        if (credential.user.uid !== ADMIN_UID) {
          await signOut(auth);
          alert("관리자 계정이 아닙니다.");
        }
      } catch (error) {
        console.error(error);
        alert("로그인 실패: 이메일 또는 비밀번호를 확인하세요.");
      }
    }

    async function loadRecords() {
      if (!auth.currentUser || auth.currentUser.uid !== ADMIN_UID) {
        alert("관리자만 기록을 볼 수 있습니다.");
        return;
      }

      adminRecords.innerHTML = "불러오는 중...";

      try {
        const q = query(collection(db, "examRecords"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          adminRecords.innerHTML = `<p class="small-text">저장된 기록이 없습니다.</p>`;
          return;
        }

        adminRecords.innerHTML = "";

        snapshot.forEach((documentSnapshot) => {
          const item = documentSnapshot.data();
          const id = documentSnapshot.id;
          const wrongNumbers = Array.isArray(item.wrongAnswers)
            ? item.wrongAnswers.map((wrong) => wrong.number).join(", ") || "없음"
            : "없음";

          const div = document.createElement("div");
          div.className = "history-item";
          div.innerHTML = `
            <h3>${item.examTitle || "이름 없는 시험"}</h3>
            날짜: ${item.createdAtText || "날짜 없음"}<br />
            점수: <input type="number" id="score-${id}" value="${item.earnedScore ?? 0}" style="width:90px;" /> / ${item.totalScore ?? 0}점<br />
            퍼센트: ${item.percentage ?? 0}%<br />
            맞힌 문항: ${item.correctCount ?? 0}개<br />
            틀린 문항: ${wrongNumbers}<br />
            <button class="small-button" data-action="update" data-id="${id}">점수 수정 저장</button>
            <button class="small-button danger-button" data-action="delete" data-id="${id}">기록 삭제</button>
          `;
          adminRecords.appendChild(div);
        });
      } catch (error) {
        console.error(error);
        adminRecords.innerHTML = `<p class="wrong">기록을 불러오지 못했습니다. Firestore 보안 규칙과 관리자 UID를 확인하세요.</p>`;
      }
    }

    async function updateRecord(id) {
      const scoreInput = document.getElementById(`score-${id}`);
      const newScore = Number(scoreInput.value);

      if (Number.isNaN(newScore)) {
        alert("점수를 숫자로 입력하세요.");
        return;
      }

      try {
        await updateDoc(doc(db, "examRecords", id), {
          earnedScore: newScore,
          updatedAt: serverTimestamp()
        });
        alert("수정되었습니다.");
        await loadRecords();
      } catch (error) {
        console.error(error);
        alert("수정 실패. 관리자 권한을 확인하세요.");
      }
    }

    async function deleteRecord(id) {
      const confirmed = confirm("이 기록을 삭제할까요?");
      if (!confirmed) return;

      try {
        await deleteDoc(doc(db, "examRecords", id));
        alert("삭제되었습니다.");
        await loadRecords();
      } catch (error) {
        console.error(error);
        alert("삭제 실패. 관리자 권한을 확인하세요.");
      }
    }

    document.getElementById("gradeButton").addEventListener("click", gradeExam);
    document.getElementById("loginButton").addEventListener("click", loginAdmin);
    document.getElementById("loadRecordsButton").addEventListener("click", loadRecords);
    document.getElementById("logoutButton").addEventListener("click", () => signOut(auth));

    adminRecords.addEventListener("click", async (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      const id = button.dataset.id;
      const action = button.dataset.action;

      if (action === "update") await updateRecord(id);
      if (action === "delete") await deleteRecord(id);
    });

    renderTable();
    initializeFirebaseIfConfigured();
  </script>
</body>
</html>
